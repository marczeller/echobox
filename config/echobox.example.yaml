# =============================================================================
# Echobox Configuration
# =============================================================================
# Copy this file to echobox.yaml and edit to match your setup.
# All paths support ~ expansion and environment variables.

# --- Audio capture backend ---
capture:
  # backend: which capture path to use
  #   "sounddevice" (default, fully tested) — the Python sounddevice path that
  #     selects BlackHole automatically. REQUIRES BlackHole + Multi-Output Device.
  #   "swift_helper" (opt-in, new) — spawns the echobox-capture Swift binary which
  #     supports live transcription, session-directory layout, and the optional
  #     Core Audio process-tap source. Requires building the helper:
  #         cd swift/echobox-capture && swift build -c release
  backend: sounddevice
  # source: only used when backend=swift_helper
  #   "default-input"  — capture from the default macOS input (BlackHole when set)
  #   "process-tap"    — Core Audio process tap, no BlackHole required (macOS 14.2+)
  #   "test-signal"    — synthetic 440 Hz sine wave (CI / smoke tests)
  source: default-input
  # device_name: substring filter for selecting an input device (case-insensitive).
  # Only used when backend=swift_helper and source=default-input. Example: "BlackHole"
  device_name: ""
  # live_transcript: enable WhisperKit streaming inside the Swift helper.
  # Only used when backend=swift_helper. Opens a floating caption panel during
  # recording; the panel is hidden from screen-share (NSWindowSharingNone).
  live_transcript: false
  # whisperkit_model: which WhisperKit on-device model to use for live captions.
  # tiny:    ~40 MB, ~14 s first-run download, runs on any Apple Silicon
  # base:    ~140 MB, better accuracy
  # large-v3-turbo: ~600 MB, best accuracy, slower first-run download
  whisperkit_model: openai_whisper-tiny
  # sessions_root: where session directories are stored (when backend=swift_helper).
  # Defaults to <data_dir>/sessions.
  sessions_root: ""

# --- Whisper transcription ---
whisper_model: mlx-community/whisper-large-v3-mlx
# Uses mlx-whisper with MLX/Metal acceleration on Apple Silicon.
# Options: mlx-community/whisper-{tiny,base,small,medium}-mlx, mlx-community/whisper-large-v3-mlx
# whisper-large-v3-mlx recommended for accuracy (~3 GB memory)

# whisper_language: en
# Optional — force Whisper to transcribe in a specific language (ISO 639-1 code).
# Default: unset (auto-detect). Set this if your calls are always in one language
# to reduce hallucinations and improve accuracy.

# --- LLM enrichment model ---
mlx_model: mlx-community/Qwen3-Next-80B-A3B-Instruct-6bit
mlx_url: http://localhost:8090/v1/chat/completions
# Install the MLX server:  pip install mlx-lm
# Start before enrichment: python -m mlx_lm server --model <model_name> --port 8090
mlx_timeout_seconds: 600
# Increase this on slower machines or with larger prompts/models.

# --- Enrichment prompt (optional) ---
# Leave unset to use the built-in prompt.
# To customize the report structure, copy templates/enrichment_prompt.txt
# and edit the wording or section names.
prompt:
  # Supported placeholders:
  #   {{transcript}}
  #   {{known_attendees}}
  #   {{meeting_type}}
  #   {{curated_context}}
  template: ""

# --- Two-machine setup (optional) ---
# Leave blank for single-machine mode.
# For two machines: laptop records, workstation enriches.
workstation_ssh: ""
# Example: "user@192.168.1.100" or "user@workstation.local"
# Use environment variable: ECHOBOX_WORKSTATION overrides this.

# --- Data directories ---
transcript_dir: ~/echobox-data/transcripts
enrichment_dir: ~/echobox-data/enrichments
report_dir: ~/echobox-data/reports
log_dir: ~/echobox-data/logs

# =============================================================================
# Context Sources
# =============================================================================
# Echobox curates context for the LLM based on meeting type.
# Each source is pluggable — configure the ones that match your toolchain.

context_sources:
  # Calendar events (primary signal for meeting classification)
  calendar:
    enabled: false
    # Command that returns JSON with an "items" array of calendar events.
    # The {date} placeholder is replaced with YYYY-MM-DD.
    command: ""
    # command: "your-calendar-cli events list --date {date} --format json"
    # Example with Google Calendar CLI:
    # command: "gcalcli agenda '{date} 00:00' '{date} 23:59' --details all --tsv"
    # If your CLI needs fragile nested quoting, prefer command_args:
    # command_args:
    #   - gws
    #   - calendar
    #   - events
    #   - list
    #   - --params
    #   - '{"calendarId":"primary","timeMin":"{date}T00:00:00Z","timeMax":"{date}T23:59:59Z","singleEvents":true,"orderBy":"startTime"}'

  # Message database (Telegram, Slack export, etc.)
  messages:
    enabled: false
    type: sqlite   # "sqlite" for direct DB access, "command" for shell command
    # command: ""  # Shell command for type: command (use {term} placeholder)
    # Path to your message database
    path: ""
    # SQL query template. {term} is replaced with search term.
    query: >
      SELECT sender_name, datetime(timestamp, 'unixepoch') as ts,
             substr(text, 1, 200) as snippet
      FROM messages
      WHERE text LIKE '%{term}%'
      AND timestamp > unixepoch('now', '-90 days')
      ORDER BY timestamp DESC
      LIMIT 15

  # Document search (semantic search, file search, etc.)
  documents:
    enabled: false
    # Command that searches your documents. {term} is the search query.
    command: ""
    # Good default on macOS:
    # command: "mdfind '{term}' | head -5 | xargs -I{} head -20 '{}' 2>/dev/null"

  # Web search (fallback for unknown attendees/topics)
  web:
    enabled: true
    # Uses DuckDuckGo Instant Answers API by default.
    # Override with your preferred search command:
    # command: "my-web-search '{query}'"

# =============================================================================
# Internal Team
# =============================================================================
# Map email addresses to names for speaker identification.
# Emails from internal domains are used to detect internal-only meetings.

team:
  members:
    # "email@domain.com": "Full Name"
    # Add your team members here:
    # "alice@yourcompany.com": "Alice Smith"
    # "bob@yourcompany.com": "Bob Jones"

  internal_domains:
    # - yourcompany.com
    # - partner-org.com

  roles:
    # "Full Name": "Role description"
    # "Alice Smith": "Engineering Lead"
    # "Bob Jones": "Product Manager"

# =============================================================================
# Meeting Classification
# =============================================================================
# Define meeting types with patterns (matched against calendar event title)
# and which context sources to query for each type.

meeting_types:
  client_call:
    patterns: ["client", "partner", "investor", "prospect"]
    context: [calendar, messages, documents, web]
    # Curates all available context for external calls

  team_sync:
    patterns: ["sync", "standup", "weekly", "retro"]
    internal_only: true
    context: [documents]
    # Only project documents for internal meetings

  one_on_one:
    patterns: ["1:1", "one on one", "check-in"]
    context: [calendar, documents]

  general:
    patterns: []
    context: [calendar, web]
    # Fallback for unclassified meetings

# =============================================================================
# Report Publishing
# =============================================================================

publish:
  # Report generation engine:
  #   "local"  — uses built-in HTML template (default, fully local, no network)
  #   "claude" — uses Claude CLI for designed reports (sends content to Anthropic API)
  engine: local

  # How to share reports (all password-gated):
  #   "local"  — save HTML files only, view with echobox open
  #   "serve"  — built-in HTTP server (echobox serve), share URL + password
  #              add --tunnel tailscale or --tunnel bore for remote access
  #   "vercel" — deploy to Vercel CDN (report leaves machine)
  platform: local

  # Password for report access (serve and vercel modes).
  # Set a real password before using echobox serve or vercel deploy.
  password: ""

  # Server port for echobox serve (default: 8090)
  serve_port: 8091

  # Vercel team scope (only needed for vercel platform)
  scope: ""

  # Custom report template (optional — uses built-in template by default)
  # template: ~/echobox/templates/report.html

# =============================================================================
# Notifications
# =============================================================================

notify:
  enabled: false
  # Shell command to send notification after each report.
  # Environment variables available:
  #   $ECHOBOX_REPORT_URL     — link to the report (file:// or https://)
  #   $ECHOBOX_REPORT_TITLE   — meeting summary (first 200 chars of enrichment)
  #   $ECHOBOX_REPORT_SUMMARY — same as title, for longer notifications
  command: ""
  #
  # Quick setup — pick one and uncomment:
  #
  # macOS native popup (simplest):
  #   command: "osascript -e \"display notification \\\"$ECHOBOX_REPORT_TITLE\\\" with title \\\"Echobox\\\" sound name \\\"Funk\\\"\""
  #
  # Slack webhook:
  #   command: "curl -sf -X POST -H 'Content-type: application/json' --data \"{\\\"text\\\":\\\"$ECHOBOX_REPORT_TITLE\\\\n$ECHOBOX_REPORT_URL\\\"}\" YOUR_WEBHOOK_URL"
  #
  # Telegram bot:
  #   command: "curl -sf 'https://api.telegram.org/botTOKEN/sendMessage?chat_id=CHATID' --data-urlencode \"text=$ECHOBOX_REPORT_TITLE $ECHOBOX_REPORT_URL\""
  #
  # Log to file:
  #   command: "echo \"$(date -Iseconds) $ECHOBOX_REPORT_TITLE $ECHOBOX_REPORT_URL\" >> ~/echobox-notifications.log"
